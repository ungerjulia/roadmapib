<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Map — Independent Brazil</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --black:#0a0b0f;--white:#f0f2f5;
  --g100:#111318;--g200:#1c2030;--g300:#2a2f42;--g400:#5a6075;--g500:#8a90a0;
  --red:#c8102e;--blue:#1a3a6b;--blue2:#2a5298;--blue3:#6ea8fe;
  --green:#2ecc71;--warn:#e67e22;--yellow:#f1c40f;
  --fd:"Syne",sans-serif;--fb:"DM Sans",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:var(--fb);min-height:100vh;overflow-x:hidden;}

.loading-overlay{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px;}
.spinner{width:24px;height:24px;border:2px solid var(--g300);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay p{font-size:13px;color:var(--g500);}

#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;}
.login-box{width:420px;padding:52px 48px;background:#111;border:1px solid #222;border-radius:16px;}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:40px;}
.login-logo img{width:52px;height:52px;border-radius:10px;}
.login-logo-text{font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#666;line-height:1.5;}
.login-title{font-family:var(--fd);font-size:28px;font-weight:800;margin-bottom:6px;color:#fff;}
.login-sub{font-size:14px;color:#555;margin-bottom:32px;}
.fg label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#555;margin-bottom:8px;}
.fg input{width:100%;padding:12px 16px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s;margin-bottom:16px;}
.fg input:focus{border-color:#fff;}
.btn-login{width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:8px;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.85;}
.login-error{margin-top:14px;padding:10px 14px;background:rgba(200,16,46,.12);border:1px solid rgba(200,16,46,.3);border-radius:8px;font-size:13px;color:var(--red);display:none;}
#app{display:none;}

.layout{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--g100);border-right:1px solid var(--g200);display:flex;flex-direction:column;padding:24px 18px;position:fixed;top:0;left:0;bottom:0;z-index:10;overflow-y:auto;}
.sidebar-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--g200);}
.sidebar-logo img{width:38px;height:38px;border-radius:8px;}
.sidebar-logo-text{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g500);line-height:1.5;}
.sidebar-section{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--g400);margin-bottom:8px;margin-top:18px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--g500);cursor:pointer;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--g200);color:var(--white);}
.nav-item.active{background:var(--g200);color:var(--red);}
.sidebar-bottom{margin-top:auto;padding-top:18px;border-top:1px solid var(--g200);}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--g200);}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:10px;color:var(--g500);}
.btn-logout{background:none;border:none;color:var(--g400);cursor:pointer;font-size:16px;padding:2px;transition:color .15s;}
.btn-logout:hover{color:var(--red);}

.main{flex:1;margin-left:240px;padding:32px 36px;min-height:100vh;}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;}
.page-title{font-family:var(--fd);font-size:30px;font-weight:800;line-height:1;}
.page-subtitle{font-size:13px;color:var(--g500);margin-top:5px;}
.btn-add{display:flex;align-items:center;gap:8px;padding:11px 20px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn-add:hover{opacity:.85;}

.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px;}
.kpi-card{background:var(--g100);border:1px solid var(--g200);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
.kpi-card::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--g300));}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--g500);margin-bottom:8px;}
.kpi-value{font-family:var(--fd);font-size:42px;font-weight:800;color:var(--white);line-height:1;letter-spacing:-.02em;}

.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.filter-select{padding:8px 12px;background:var(--g100);border:1px solid var(--g200);border-radius:8px;color:var(--white);font-family:var(--fb);font-size:13px;cursor:pointer;outline:none;}
.search-input{padding:8px 12px;background:var(--g100);border:1px solid var(--g200);border-radius:8px;color:var(--white);font-family:var(--fb);font-size:13px;outline:none;width:220px;}
.search-input:focus,.filter-select:focus{border-color:var(--blue3);}

.table-wrap{background:var(--g100);border:1px solid var(--g200);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{border-bottom:1px solid var(--g200);}
thead th{padding:12px 16px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#ffffff;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--g200);transition:background .15s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--g200);}
td{padding:13px 16px;color:var(--white);vertical-align:middle;}
.td-name{font-weight:600;font-size:14px;}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bs-backlog {background:rgba(255,255,255,.1);color:#d0d4dc;}
.bs-planning{background:rgba(42,82,152,.25);color:var(--blue3);}
.bs-running {background:rgba(241,196,15,.15);color:var(--yellow);}
.bs-done    {background:rgba(46,204,113,.15);color:var(--green);}
.bs-paused  {background:rgba(200,16,46,.15);color:#ff6b6b;}
.bp-critical{background:rgba(200,16,46,.15);color:var(--red);}
.bp-high    {background:rgba(230,126,34,.15);color:var(--warn);}
.bp-medium  {background:rgba(42,82,152,.2);color:var(--blue3);}
.bp-low     {background:rgba(138,144,160,.15);color:#8a90a0;}
.bt         {background:var(--g200);color:var(--g500);border:1px solid var(--g300);}

.row-actions{display:flex;gap:6px;opacity:0;transition:opacity .15s;}
tbody tr:hover .row-actions{opacity:1;}
.btn-icon{background:var(--g200);border:1px solid var(--g300);color:var(--white);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-icon:hover{background:var(--g300);}
.btn-icon.danger:hover{background:rgba(200,16,46,.2);border-color:var(--red);color:var(--red);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--g100);border:1px solid var(--g200);border-radius:16px;width:100%;max-width:760px;max-height:92vh;overflow-y:auto;padding:36px 40px;animation:fadeUp .22s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.modal-sm{max-width:440px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.modal-title{font-family:var(--fd);font-size:20px;font-weight:800;}
.btn-close{background:var(--g200);border:none;color:var(--g500);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-close:hover{background:var(--g300);color:var(--white);}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg{margin-bottom:16px;}
.fg.full{grid-column:1/-1;}
.fg label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g500);margin-bottom:7px;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;background:var(--g200);border:1px solid var(--g300);border-radius:8px;color:var(--white);font-family:var(--fb);font-size:13px;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue3);}
.fg select option{background:var(--g200);}
.fg textarea{resize:vertical;min-height:80px;}

/* SETOR CHECKBOXES */
.setor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
.setor-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--g200);border:1px solid var(--g300);border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--g500);}
.setor-item:hover{border-color:var(--blue3);color:var(--white);}
.setor-item input[type=checkbox]{accent-color:var(--blue3);width:14px;height:14px;cursor:pointer;}
.setor-item.checked{background:rgba(42,82,152,.2);border-color:var(--blue3);color:var(--blue3);}

.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:28px;padding-top:22px;border-top:1px solid var(--g200);}
.btn-secondary{padding:10px 20px;background:var(--g200);border:1px solid var(--g300);color:var(--white);border-radius:8px;font-family:var(--fd);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.btn-secondary:hover{background:var(--g300);}
.btn-save{padding:10px 26px;background:var(--red);border:none;color:#fff;border-radius:8px;font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn-save:hover{opacity:.85;}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.di{display:flex;flex-direction:column;gap:5px;}
.di.full{grid-column:1/-1;}
.di-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g500);}
.di-value{font-size:14px;color:var(--white);line-height:1.6;}

.deliveries-section{margin-top:8px;}
.delivery-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;padding:10px 12px;background:var(--g200);border-radius:8px;border:1px solid var(--g300);}
.delivery-item input,.delivery-item textarea{flex:1;padding:8px 10px;background:var(--g300);border:1px solid var(--g300);border-radius:6px;color:var(--white);font-family:var(--fb);font-size:13px;outline:none;}
.delivery-item textarea{min-height:60px;resize:vertical;}
.delivery-item input[type=date]{flex:0 0 155px;}
.btn-rm-delivery{background:none;border:none;color:var(--g400);cursor:pointer;font-size:18px;padding:0 4px;transition:color .15s;flex-shrink:0;}
.btn-rm-delivery:hover{color:var(--red);}
.btn-add-delivery{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--g200);border:1px solid var(--g300);border-radius:8px;color:var(--blue3);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;width:fit-content;margin-top:4px;}
.btn-add-delivery:hover{background:var(--g300);border-color:var(--blue3);}

.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--g500);}
.empty-sub{font-size:13px;color:var(--g400);margin-top:6px;}

.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--g100);border:1px solid var(--g200);border-radius:10px;font-size:13px;font-weight:500;color:var(--white);z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}

.link-preview{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(42,82,152,.2);border:1px solid var(--blue2);border-radius:8px;color:var(--blue3);font-size:13px;text-decoration:none;transition:all .15s;margin-top:4px;}
.link-preview:hover{background:rgba(42,82,152,.35);}
.delivery-list-item{padding:10px 12px;background:var(--g200);border-radius:8px;border-left:3px solid var(--blue2);margin-bottom:8px;}
.delivery-date{font-size:11px;color:var(--blue3);font-weight:600;margin-bottom:3px;}
.delivery-desc{font-size:13px;color:var(--white);}

/* KPI CHARTS PAGE */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px;}
.chart-card{background:var(--g100);border:1px solid var(--g200);border-radius:14px;padding:24px;}
.chart-title{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:18px;color:var(--white);}
.chart-card.full{grid-column:1/-1;}
canvas{max-height:280px;}
.chart-filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.chart-filters select,.chart-filters input{padding:7px 12px;background:var(--g200);border:1px solid var(--g300);border-radius:8px;color:var(--white);font-family:var(--fb);font-size:12px;outline:none;}
.chart-filters select:focus,.chart-filters input:focus{border-color:var(--blue3);}

.setor-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.setor-tag{padding:2px 8px;background:rgba(42,82,152,.2);border:1px solid var(--blue2);border-radius:12px;font-size:11px;color:var(--blue3);}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCw6pEgnGylNXKzYsXxU58yRAgRnMWqVM",
  authDomain: "road-map-ib.firebaseapp.com",
  projectId: "road-map-ib",
  storageBucket: "road-map-ib.firebasestorage.app",
  messagingSenderId: "1093393711787",
  appId: "1:1093393711787:web:c0119f04e9ba4e171d2dee"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

let currentUser=null, isAdmin=false, projects=[], editingId=null, deleteId=null;
let activeView="dashboard", filterStatus=null;
let chartInstances={};

const SETORES = ["Comercial","Import","Seafood","Feed Meal","Commodities","Meat","RH","Financeiro","Operacional","TI","Toda a Empresa"];

// ── AUTH ──
window.doLogin = async function() {
  const email = document.getElementById("loginEmail").value.trim();
  const pass  = document.getElementById("loginPassword").value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    document.getElementById("loginError").style.display="none";
  } catch(e) {
    document.getElementById("loginError").style.display="block";
  }
};
window.doLogout = async function() { await signOut(auth); };

const loadingTimeout = setTimeout(()=>{
  const ov=document.getElementById("loadingOverlay");
  if(ov && ov.style.display!=="none"){
    document.getElementById("loadingMsg").textContent="Tempo esgotado. Verifique sua conexão.";
    setTimeout(()=>{ ov.style.display="none"; document.getElementById("loginScreen").style.display="flex"; },2000);
  }
},8000);

onAuthStateChanged(auth, async function(user) {
  clearTimeout(loadingTimeout);
  document.getElementById("loadingOverlay").style.display="none";
  if(user){
    currentUser=user; isAdmin=(user.email==="julia@independentbrazil.com");
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
    const name=isAdmin?"Júlia":"Lincon";
    document.getElementById("sidebarAvatar").textContent=name[0];
    document.getElementById("sidebarName").textContent=name;
    document.getElementById("sidebarRole").textContent=isAdmin?"Administrador":"Visualizador";
    await loadProjects(); renderView();
  } else {
    currentUser=null;
    document.getElementById("loginScreen").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

// ── FIRESTORE ──
async function loadProjects() {
  try {
    const q=query(collection(db,"projects"),orderBy("createdAt","desc"));
    const snap=await getDocs(q);
    projects=snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch {
    const snap=await getDocs(collection(db,"projects"));
    projects=snap.docs.map(d=>({id:d.id,...d.data()}));
  }
}

// ── SETOR TOGGLE ──
window.toggleSetor = function(cb) {
  const label=cb.closest(".setor-item");
  if(cb.checked) label.classList.add("checked");
  else label.classList.remove("checked");
};

// ── SAVE ──
window.saveProject = async function() {
  const name=document.getElementById("fName").value.trim();
  const type=document.getElementById("fType").value;
  if(!name||!type){ showToast("Preencha nome e tipo.","error"); return; }

  const setores=[];
  document.querySelectorAll("#setorGrid input:checked").forEach(function(cb){ setores.push(cb.value); });

  const deliveries=[];
  document.querySelectorAll(".delivery-item").forEach(function(item){
    const dt=item.querySelector(".d-date").value;
    const ds=item.querySelector(".d-desc").value.trim();
    if(dt||ds) deliveries.push({date:dt,desc:ds});
  });

  const data={
    name,type,
    status:    document.getElementById("fStatus").value,
    startDate: document.getElementById("fStart").value,
    endDate:   document.getElementById("fEnd").value,
    endDateReal: document.getElementById("fEndReal").value,
    priority:  document.getElementById("fPriority").value,
    requester: document.getElementById("fRequester").value.trim(),
    setores,
    link:      document.getElementById("fLink").value.trim(),
    image:     document.getElementById("fImage").value.trim(),
    description: document.getElementById("fDesc").value.trim(),
    impact:    document.getElementById("fImpact").value.trim(),
    deliveries,
    updatedAt: serverTimestamp()
  };

  try {
    if(editingId){
      await updateDoc(doc(db,"projects",editingId),data);
      showToast("Projeto atualizado!","success");
    } else {
      data.createdAt=serverTimestamp();
      await addDoc(collection(db,"projects"),data);
      showToast("Projeto criado!","success");
    }
    closeModal("modalForm");
    await loadProjects(); renderView();
  } catch(e){ showToast("Erro: "+e.message,"error"); }
};

window.confirmDelete = async function() {
  try {
    await deleteDoc(doc(db,"projects",deleteId));
    showToast("Projeto excluído.","success");
    closeModal("modalDelete");
    await loadProjects(); renderView();
  } catch(e){ showToast("Erro: "+e.message,"error"); }
};

// ── VIEWS ──
window.showView = function(v) {
  activeView=v; filterStatus=null;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  renderView();
};
window.quickFilter = function(status) { activeView="table"; filterStatus=status; renderView(); };

function renderView() {
  // Destroy old charts
  Object.values(chartInstances).forEach(c=>c.destroy());
  chartInstances={};
  const mc=document.getElementById("mainContent");
  if(activeView==="dashboard") mc.innerHTML=buildDashboard();
  else if(activeView==="kpis")  { mc.innerHTML=buildKPIs(); initCharts(); }
  else mc.innerHTML=buildTable();
}

// ── DASHBOARD ──
function buildDashboard() {
  const total=projects.length;
  const run  =projects.filter(p=>p.status==="Em Execucao").length;
  const done =projects.filter(p=>p.status==="Concluido").length;
  const back =projects.filter(p=>p.status==="Backlog").length;
  const plan =projects.filter(p=>p.status==="Em Planejamento").length;
  const kpis=[
    {label:"Total",        value:total,color:"#5a6075"},
    {label:"Em Execução",  value:run,  color:"#f1c40f"},
    {label:"Concluídos",   value:done, color:"#2ecc71"},
    {label:"Planejamento", value:plan, color:"#6ea8fe"},
    {label:"Backlog",      value:back, color:"#8a90a0"},
  ];
  const kpiHtml=kpis.map(k=>`<div class="kpi-card" style="--c:${k.color}"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div></div>`).join("");
  return `<div class="page-header"><div><div class="page-title">Road Map</div><div class="page-subtitle">Inteligência & Projetos — Independent Brazil</div></div>${isAdmin?`<button class="btn-add" onclick="openNew()">+ Novo Projeto</button>`:""}</div><div class="kpi-grid">${kpiHtml}</div><div style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;"><div style="font-family:var(--fd);font-size:16px;font-weight:700;">Projetos Recentes</div><button class="btn-secondary" style="font-size:12px;padding:7px 14px;" onclick="showView('table')">Ver todos →</button></div><div class="table-wrap">${buildTableBody(projects.slice(0,8))}</div>`;
}

// ── KPIs PAGE ──
function buildKPIs() {
  return `<div class="page-header"><div><div class="page-title">KPIs</div><div class="page-subtitle">Visões gráficas dos projetos</div></div></div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Projetos por Setor</div>
      <canvas id="chartSetor"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Projetos por Prioridade</div>
      <canvas id="chartPriority"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Projetos por Status</div>
      <canvas id="chartStatus"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Data Estimada × Data Real de Entrega</div>
      <canvas id="chartDates"></canvas>
    </div>
    <div class="chart-card full">
      <div class="chart-title">Projetos Concluídos por Mês</div>
      <div class="chart-filters">
        <label style="font-size:12px;color:var(--g500);">Ano:</label>
        <select id="filterYearChart" onchange="updateConcludedChart()">
          ${getYearOptions()}
        </select>
      </div>
      <canvas id="chartConcluded"></canvas>
    </div>
  </div>`;
}

function getYearOptions() {
  const years=new Set();
  const cur=new Date().getFullYear();
  for(let y=cur-2;y<=cur+1;y++) years.add(y);
  projects.forEach(p=>{
    if(p.endDateReal) years.add(parseInt(p.endDateReal.split("-")[0]));
    if(p.endDate) years.add(parseInt(p.endDate.split("-")[0]));
  });
  return [...years].sort().map(y=>`<option value="${y}" ${y===cur?"selected":""}>${y}</option>`).join("");
}

function initCharts() {
  const chartDefaults = {
    responsive:true,
    plugins:{ legend:{ labels:{ color:"#8a90a0", font:{family:"DM Sans",size:12} } } },
    scales:{}
  };

  // 1. Por Setor
  const setorCount={};
  projects.forEach(p=>{
    (p.setores||[]).forEach(s=>{ setorCount[s]=(setorCount[s]||0)+1; });
  });
  // also count projects without setor
  const semSetor=projects.filter(p=>!p.setores||p.setores.length===0).length;
  if(semSetor>0) setorCount["Não definido"]=semSetor;

  const setorColors=["#6ea8fe","#2ecc71","#f1c40f","#e67e22","#c8102e","#9b59b6","#1abc9c","#e74c3c","#3498db","#f39c12","#8a90a0","#5a6075"];
  chartInstances.setor=new Chart(document.getElementById("chartSetor"),{
    type:"doughnut",
    data:{labels:Object.keys(setorCount),datasets:[{data:Object.values(setorCount),backgroundColor:setorColors.slice(0,Object.keys(setorCount).length),borderWidth:0}]},
    options:{...chartDefaults,cutout:"60%"}
  });

  // 2. Por Prioridade
  const prioMap={"Critico":0,"Alto":0,"Medio":0,"Baixo":0,"":0};
  projects.forEach(p=>{ const k=p.priority||""; prioMap[k]=(prioMap[k]||0)+1; });
  const prioLabels=["Crítico","Alto","Médio","Baixo","Não def."];
  const prioKeys=["Critico","Alto","Medio","Baixo",""];
  const prioColors=["#c8102e","#e67e22","#6ea8fe","#8a90a0","#5a6075"];
  chartInstances.priority=new Chart(document.getElementById("chartPriority"),{
    type:"bar",
    data:{labels:prioLabels,datasets:[{data:prioKeys.map(k=>prioMap[k]||0),backgroundColor:prioColors,borderRadius:6,borderWidth:0}]},
    options:{...chartDefaults,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#8a90a0"},grid:{color:"rgba(255,255,255,.05)"}},y:{ticks:{color:"#8a90a0",stepSize:1},grid:{color:"rgba(255,255,255,.05)"}}}}
  });

  // 3. Por Status
  const statMap={"Backlog":0,"Em Planejamento":0,"Em Execucao":0,"Concluido":0,"Pausado":0};
  projects.forEach(p=>{ if(statMap[p.status]!==undefined) statMap[p.status]++; });
  chartInstances.status=new Chart(document.getElementById("chartStatus"),{
    type:"pie",
    data:{labels:["Backlog","Planejamento","Em Execução","Concluído","Pausado"],
      datasets:[{data:Object.values(statMap),backgroundColor:["#d0d4dc","#6ea8fe","#f1c40f","#2ecc71","#ff6b6b"],borderWidth:0}]},
    options:{...chartDefaults}
  });

  // 4. Estimada x Real
  const compared=projects.filter(p=>p.endDate&&p.endDateReal).map(p=>({
    name:p.name.length>20?p.name.substring(0,18)+"…":p.name,
    est:new Date(p.endDate).getTime(),
    real:new Date(p.endDateReal).getTime()
  })).slice(0,10);
  const fmtTs=ts=>{ const d=new Date(ts); return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`; };
  chartInstances.dates=new Chart(document.getElementById("chartDates"),{
    type:"bar",
    data:{
      labels:compared.map(p=>p.name),
      datasets:[
        {label:"Data Estimada",data:compared.map(p=>p.est),backgroundColor:"rgba(110,168,254,.6)",borderRadius:4,borderWidth:0},
        {label:"Data Real",    data:compared.map(p=>p.real),backgroundColor:"rgba(46,204,113,.6)",borderRadius:4,borderWidth:0}
      ]
    },
    options:{...chartDefaults,scales:{x:{ticks:{color:"#8a90a0"},grid:{display:false}},y:{ticks:{color:"#8a90a0",callback:v=>fmtTs(v)},grid:{color:"rgba(255,255,255,.05)"}}}}
  });

  // 5. Concluídos por mês
  buildConcludedChart();
}

window.updateConcludedChart = function() {
  if(chartInstances.concluded){ chartInstances.concluded.destroy(); delete chartInstances.concluded; }
  buildConcludedChart();
};

function buildConcludedChart() {
  const yearEl=document.getElementById("filterYearChart");
  if(!yearEl) return;
  const year=parseInt(yearEl.value)||new Date().getFullYear();
  const months=Array(12).fill(0);
  const monthLabels=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  projects.forEach(p=>{
    if(p.status==="Concluido"){
      const dateStr=p.endDateReal||p.endDate;
      if(dateStr){
        const d=new Date(dateStr);
        if(d.getFullYear()===year) months[d.getMonth()]++;
      }
    }
  });
  chartInstances.concluded=new Chart(document.getElementById("chartConcluded"),{
    type:"bar",
    data:{labels:monthLabels,datasets:[{label:"Projetos Concluídos",data:months,backgroundColor:"rgba(46,204,113,.7)",borderRadius:6,borderWidth:0}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#8a90a0"},grid:{display:false}},y:{ticks:{color:"#8a90a0",stepSize:1},grid:{color:"rgba(255,255,255,.05)"}}}}
  });
}

// ── TABLE ──
function buildTable() {
  const fp=filterStatus?projects.filter(p=>p.status===filterStatus):projects;
  return `<div class="page-header"><div><div class="page-title">${filterStatus||"Todos os Projetos"}</div><div class="page-subtitle">${fp.length} projeto${fp.length!==1?"s":""} encontrado${fp.length!==1?"s":""}</div></div>${isAdmin?`<button class="btn-add" onclick="openNew()">+ Novo Projeto</button>`:""}</div>
  <div class="filters">
    <input class="search-input" id="searchBox" placeholder="🔍 Buscar projeto…" oninput="applySearch()" />
    <select class="filter-select" id="filterType" onchange="applySearch()">
      <option value="">Todos os tipos</option>
      <option>Software</option><option>Automação</option><option>Melhoria de Processo</option>
      <option>App Web</option><option>Criação de Agente</option><option>Refatoração</option>
    </select>
    <select class="filter-select" id="filterPrio" onchange="applySearch()">
      <option value="">Todas as prioridades</option>
      <option value="Critico">Crítico</option><option value="Alto">Alto</option><option value="Medio">Médio</option><option value="Baixo">Baixo</option>
    </select>
    <select class="filter-select" id="filterSetor" onchange="applySearch()">
      <option value="">Todos os setores</option>
      ${SETORES.map(s=>`<option>${s}</option>`).join("")}
    </select>
  </div>
  <div class="table-wrap" id="tableWrap">${buildTableBody(fp)}</div>`;
}

window.applySearch = function() {
  const q=(document.getElementById("searchBox")||{}).value||"";
  const type=(document.getElementById("filterType")||{}).value||"";
  const prio=(document.getElementById("filterPrio")||{}).value||"";
  const setor=(document.getElementById("filterSetor")||{}).value||"";
  let fp=filterStatus?projects.filter(p=>p.status===filterStatus):projects;
  if(q) fp=fp.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||(p.description||"").toLowerCase().includes(q.toLowerCase()));
  if(type) fp=fp.filter(p=>p.type===type);
  if(prio) fp=fp.filter(p=>p.priority===prio);
  if(setor) fp=fp.filter(p=>(p.setores||[]).includes(setor));
  document.getElementById("tableWrap").innerHTML=buildTableBody(fp);
};

function buildTableBody(list) {
  if(!list.length) return `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Nenhum projeto encontrado</div><div class="empty-sub">${isAdmin?"Clique em + Novo Projeto para começar":"Nenhum projeto disponível no momento"}</div></div>`;
  const rows=list.map(p=>`
    <tr onclick="openDetail('${p.id}')">
      <td class="td-name">${esc(p.name)}</td>
      <td><span class="badge bt">${esc(p.type||"—")}</span></td>
      <td>${statusBadge(p.status)}</td>
      <td>${prioBadge(p.priority)}</td>
      <td style="color:var(--g500)">${fmtDate(p.startDate)}</td>
      <td style="color:var(--g500)">${fmtDate(p.endDate)}</td>
      <td style="color:var(--g500)">${fmtDate(p.endDateReal)||"—"}</td>
      <td style="color:var(--g500)">${esc(p.requester||"—")}</td>
      <td style="max-width:160px;">${(p.setores||[]).map(s=>`<span class="setor-tag">${s}</span>`).join("")||"—"}</td>
      <td onclick="event.stopPropagation()">
        ${isAdmin?`<div class="row-actions"><button class="btn-icon" onclick="openEdit('${p.id}')" title="Editar">✏️</button><button class="btn-icon danger" onclick="openDelete('${p.id}','${esc(p.name)}')" title="Excluir">🗑</button></div>`:""}
      </td>
    </tr>`).join("");
  return `<table><thead><tr>
    <th>Projeto</th><th>Tipo</th><th>Etapa</th><th>Prioridade</th>
    <th>Início</th><th>Data Estimada</th><th>Data Real</th>
    <th>Solicitado por</th><th>Setor</th><th></th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── MODALS ──
window.openNew = function() {
  editingId=null;
  document.getElementById("modalFormTitle").textContent="Novo Projeto";
  ["fName","fStart","fEnd","fEndReal","fRequester","fDesc","fImpact","fLink","fImage"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fType").value="";
  document.getElementById("fStatus").value="Backlog";
  document.getElementById("fPriority").value="";
  document.getElementById("deliveriesContainer").innerHTML="";
  document.querySelectorAll("#setorGrid input").forEach(cb=>{ cb.checked=false; cb.closest(".setor-item").classList.remove("checked"); });
  openModal("modalForm");
};

window.openEdit = function(id) {
  const p=projects.find(x=>x.id===id);
  if(!p) return;
  editingId=id;
  document.getElementById("modalFormTitle").textContent="Editar Projeto";
  document.getElementById("fName").value=p.name||"";
  document.getElementById("fType").value=p.type||"";
  document.getElementById("fStatus").value=p.status||"Backlog";
  document.getElementById("fStart").value=p.startDate||"";
  document.getElementById("fEnd").value=p.endDate||"";
  document.getElementById("fEndReal").value=p.endDateReal||"";
  document.getElementById("fPriority").value=p.priority||"";
  document.getElementById("fRequester").value=p.requester||"";
  document.getElementById("fLink").value=p.link||"";
  document.getElementById("fImage").value=p.image||"";
  document.getElementById("fDesc").value=p.description||"";
  document.getElementById("fImpact").value=p.impact||"";
  // setores
  document.querySelectorAll("#setorGrid input").forEach(cb=>{
    cb.checked=(p.setores||[]).includes(cb.value);
    cb.checked?cb.closest(".setor-item").classList.add("checked"):cb.closest(".setor-item").classList.remove("checked");
  });
  const dc=document.getElementById("deliveriesContainer");
  dc.innerHTML="";
  (p.deliveries||[]).forEach(d=>addDeliveryField(d.date,d.desc));
  openModal("modalForm");
};

window.openDelete = function(id,name) {
  deleteId=id;
  document.getElementById("deleteProjectName").textContent=name;
  openModal("modalDelete");
};

window.openDetail = function(id) {
  const p=projects.find(x=>x.id===id);
  if(!p) return;
  document.getElementById("detailTitle").textContent=p.name;
  const delivHtml=(p.deliveries&&p.deliveries.length)?p.deliveries.map(d=>`<div class="delivery-list-item">${d.date?`<div class="delivery-date">📅 ${fmtDate(d.date)}</div>`:""}<div class="delivery-desc">${esc(d.desc||"—")}</div></div>`).join(""):`<span style="color:var(--g500);font-size:13px;">Nenhuma entrega registrada</span>`;
  const setorHtml=(p.setores&&p.setores.length)?p.setores.map(s=>`<span class="setor-tag">${s}</span>`).join(""):`<span style="color:var(--g500)">—</span>`;
  const linkHtml=p.link?`<a href="${esc(p.link)}" target="_blank" class="link-preview">🔗 Abrir App / Link</a>`:`<span style="color:var(--g500)">—</span>`;
  const imgHtml=p.image?`<img src="${esc(p.image)}" style="max-width:100%;max-height:280px;border-radius:10px;border:1px solid var(--g300);margin-top:6px;" />`:"";
  document.getElementById("detailBody").innerHTML=
    `<div class="di"><span class="di-label">Tipo</span><span class="di-value"><span class="badge bt">${esc(p.type||"—")}</span></span></div>`+
    `<div class="di"><span class="di-label">Etapa</span><span class="di-value">${statusBadge(p.status)}</span></div>`+
    `<div class="di"><span class="di-label">Prioridade</span><span class="di-value">${prioBadge(p.priority)}</span></div>`+
    `<div class="di"><span class="di-label">Solicitado por</span><span class="di-value">${esc(p.requester||"—")}</span></div>`+
    `<div class="di"><span class="di-label">Início</span><span class="di-value">${fmtDate(p.startDate)}</span></div>`+
    `<div class="di"><span class="di-label">Data Estimada</span><span class="di-value">${fmtDate(p.endDate)}</span></div>`+
    `<div class="di full"><span class="di-label">Data Real de Entrega</span><span class="di-value">${fmtDate(p.endDateReal)||"—"}</span></div>`+
    `<div class="di full"><span class="di-label">🏢 Setor Favorecido</span><div class="setor-tags" style="margin-top:6px;">${setorHtml}</div></div>`+
    `<div class="di full"><span class="di-label">🔗 Link do App</span><span class="di-value">${linkHtml}</span></div>`+
    (p.image?`<div class="di full"><span class="di-label">🖼️ Imagem</span>${imgHtml}</div>`:"")+
    `<div class="di full"><span class="di-label">Descrição</span><span class="di-value">${esc(p.description||"—")}</span></div>`+
    `<div class="di full"><span class="di-label">Impacto Esperado</span><span class="di-value">${esc(p.impact||"—")}</span></div>`+
    `<div class="di full"><span class="di-label">📦 Entregas Parciais</span><div style="margin-top:8px;">${delivHtml}</div></div>`+
    (isAdmin?`<div class="di full" style="display:flex;gap:10px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--g200);"><button class="btn-secondary" onclick="closeModal('modalDetail')">Fechar</button><button class="btn-save" onclick="closeModal('modalDetail');openEdit('${p.id}')">✏️ Editar</button></div>`:"");
  openModal("modalDetail");
};

window.addDeliveryField = function(date,desc) {
  const dc=document.getElementById("deliveriesContainer");
  const div=document.createElement("div");
  div.className="delivery-item";
  div.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px;flex:1;"><input type="date" class="d-date" value="${date||""}"/><textarea class="d-desc" placeholder="Descreva o que foi entregue…">${desc||""}</textarea></div><button type="button" class="btn-rm-delivery" onclick="this.parentElement.remove()" title="Remover">✕</button>`;
  dc.appendChild(div);
};

function openModal(id){ document.getElementById(id).classList.add("open"); }
window.closeModal=function(id){ document.getElementById(id).classList.remove("open"); };

// ── HELPERS ──
function statusBadge(s) {
  const map={"Backlog":"bs-backlog","Em Planejamento":"bs-planning","Em Execucao":"bs-running","Concluido":"bs-done","Pausado":"bs-paused"};
  const labels={"Backlog":"Backlog","Em Planejamento":"Em Planejamento","Em Execucao":"Em Execução","Concluido":"Concluído","Pausado":"Pausado"};
  return `<span class="badge ${map[s]||"bs-backlog"}">${labels[s]||s||"Backlog"}</span>`;
}
function prioBadge(p) {
  const map={"Critico":"bp-critical","Alto":"bp-high","Medio":"bp-medium","Baixo":"bp-low"};
  const labels={"Critico":"Crítico","Alto":"Alto","Medio":"Médio","Baixo":"Baixo"};
  if(!p) return `<span class="badge bp-low">—</span>`;
  return `<span class="badge ${map[p]||"bp-low"}">${labels[p]||p}</span>`;
}
function fmtDate(d) {
  if(!d) return "—";
  const parts=d.split("-");
  return parts[2]+"/"+parts[1]+"/"+parts[0];
}
function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function showToast(msg,type) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast "+(type||"")+" show";
  setTimeout(()=>{ t.className="toast"; },3000);
}

document.getElementById("loginPassword").addEventListener("keydown",e=>{ if(e.key==="Enter") window.doLogin(); });
document.querySelectorAll(".modal-overlay").forEach(el=>{ el.addEventListener("click",e=>{ if(e.target===el) el.classList.remove("open"); }); });
</script>
